name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore vs-md-extension-buddy.slnx

      - name: Build (Release)
        run: msbuild vs-md-extension-buddy.slnx /p:Configuration=Release /p:DeployExtension=false

      - name: Run tests
        run: dotnet test vs-md-extension-buddy.Tests --configuration Release --verbosity normal --nologo

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: bin\Release\vs-markdown-region-buddy.vsix
